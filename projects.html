<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Ideas — SkillPilot AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="#ff8f73" stroke-width="2"/>
        <path d="M12 7L14 12L12 17L10 12L12 7Z" fill="#ff8f73"/>
      </svg>
      <span>SkillPilot</span>
    </div>
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </header>
  <nav class="nav-drawer" id="navDrawer">
    <a href="index.html">Home</a>
    <a href="videos.html">Video Tutorials</a>
    <a href="web-tutorials.html">Web Tutorials & Notes</a>
    <a href="practice.html">Practice Sites</a>
    <a href="certifications.html">Certifications</a>
    <a href="projects.html">Project Ideas</a>
  </nav>
  <div class="container">
    <div class="page-header">
      <h1>Project Ideas</h1>
      <p class="hero-text">Things to build once you know the basics.</p>
    </div>
    <div class="career-switcher" id="careerSwitcher"></div>
    <div class="card" id="listContent"></div>
  </div>
  <script src="data.js"></script>
  <script>
    initHamburger();
    const switcherEl = document.getElementById("careerSwitcher");
    const listEl = document.getElementById("listContent");
    let currentCareer = getSelectedCareer();
    function renderList() {
      listEl.innerHTML = "";
      CAREER_CONTENT[currentCareer].projects.forEach(function (item) {
        const div = document.createElement("div");
        div.className = "project-item";
        div.innerHTML = "<h4>" + item.title + " <span class='level-badge " + item.level + "'>" + item.level + "</span></h4><p>" + item.desc + "</p>";
        listEl.appendChild(div);
      });
    }
    function render() {
      renderCareerPills(switcherEl, currentCareer, function (career) {
        currentCareer = career;
        render();
      });
      renderList();
    }
    render();
  </script>
</body>
</html>
