<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkillPilot AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="#ff8f73" stroke-width="2"/>
        <path d="M12 7L14 12L12 17L10 12L12 7Z" fill="#ff8f73"/>
      </svg>
      <span>SkillPilot</span>
    </div>
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <nav class="nav-drawer" id="navDrawer">
    <a href="index.html">Home</a>
    <a href="videos.html">Video Tutorials</a>
    <a href="web-tutorials.html">Web Tutorials & Notes</a>
    <a href="practice.html">Practice Sites</a>
    <a href="certifications.html">Certifications</a>
    <a href="projects.html">Project Ideas</a>
  </nav>

  <div class="container">
    <div class="hero">
      <h1>SkillPilot AI</h1>
      <p class="hero-text">Pick a career, tell it how much time you have, and get a study plan built from real, researched curricula.</p>

      <div class="card">
        <label for="career">Choose a career</label>
        <select id="career">
          <option value="Data Science">Data Science</option>
          <option value="Data Analyst">Data Analyst</option>
          <option value="Backend Developer">Backend Developer</option>
        </select>

        <label for="hours">Hours per day you can study</label>
        <input type="number" id="hours" value="2" min="1" max="8">

        <button id="generateBtn">Generate My Plan</button>

        <div id="result"></div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    initHamburger();
    document.getElementById("career").value = getSelectedCareer();

    const button = document.getElementById("generateBtn");
    const resultBox = document.getElementById("result");

    button.addEventListener("click", async function () {
      const career = document.getElementById("career").value;
      const hours = document.getElementById("hours").value;
      setSelectedCareer(career);

      resultBox.innerHTML = "Generating your plan...";
      button.disabled = true;

      try {
        const response = await fetch("/api/plan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ career: career, hours: hours })
        });

        const data = await response.json();

        if (data.plan) {
          resultBox.innerHTML = "";
          const header = document.createElement("h3");
          header.textContent = career + " Plan (" + data.plan.totalDays + " days total)";
          resultBox.appendChild(header);

          data.plan.topics.forEach(function (topic) {
            const item = document.createElement("div");
            item.className = "topic-item";
            item.innerHTML = "<h4>Topic " + topic.topicNumber + ": " + topic.title + " <span class='days-badge'>" + topic.days + " days</span></h4><p>" + topic.description + "</p>";
            resultBox.appendChild(item);
          });
        } else {
          resultBox.textContent = "Something went wrong. Please try again.";
        }
      } catch (error) {
        resultBox.textContent = "Something went wrong. Please try again.";
      }

      button.disabled = false;
    });
  </script>
</body>
</html>
