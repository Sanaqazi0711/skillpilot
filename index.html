<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SkillPilot AI</title>
</head>
<body>
  <h1>SkillPilot AI</h1>
  <p>Your AI-assisted guide to exploring tech careers.</p>

  <h2>Get Your Study Plan</h2>

  <label for="career">Choose a career:</label>
  <select id="career">
    <option value="Data Science">Data Science</option>
    <option value="Data Analyst">Data Analyst</option>
    <option value="Backend Developer">Backend Developer</option>
  </select>

  <br><br>

  <label for="hours">Hours per day you can study:</label>
  <input type="number" id="hours" value="2" min="1" max="8">

  <br><br>

  <button id="generateBtn">Generate My Plan</button>

  <div id="result"></div>

  <script>
    const button = document.getElementById("generateBtn");
    const resultBox = document.getElementById("result");

    button.addEventListener("click", async function () {
      const career = document.getElementById("career").value;
      const hours = document.getElementById("hours").value;

      resultBox.textContent = "Generating your plan...";
      button.disabled = true;

      try {
        const response = await fetch("/api/plan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ career: career, hours: hours })
        });

        const data = await response.json();

        if (data.plan) {
          resultBox.innerHTML = "";

          const header = document.createElement("h3");
          header.textContent = career + " Plan (" + data.totalMonths + " months)";
          resultBox.appendChild(header);

          data.plan.months.forEach(function (month) {
            const monthHeading = document.createElement("h4");
            monthHeading.textContent = "Month " + month.monthNumber + ": " + month.title;
            resultBox.appendChild(monthHeading);

            const weekList = document.createElement("ul");
            month.weeks.forEach(function (week) {
              const item = document.createElement("li");
              item.innerHTML = "<strong>Week " + week.weekNumber + " – " + week.theme + ":</strong> " + week.description;
              weekList.appendChild(item);
            });
            resultBox.appendChild(weekList);
          });
        } else {
          resultBox.textContent = "Something went wrong. Please try again.";
        }
      } catch (error) {
        resultBox.textContent = "Something went wrong. Please try again.";
      }

      button.disabled = false;
    });
  </script>
</body>
</html>
